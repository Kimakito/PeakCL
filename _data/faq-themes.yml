# FAQ organisée par thématiques

# 💰 PRIX & BUDGET
- theme: "budget"
  theme_title: "💰 Prix & Budget"
  theme_color: "yellow"
  questions:
    - question: "Combien coûte un site internet professionnel ?"
      answer: "Le tarif s'adapte à votre projet : nombre de pages nécessaires, fonctionnalités demandées, et complexité de mise en place. Chaque projet est sur-mesure car chaque entreprise est unique. <a href='/web-strategy/2026/01/08/budget-site-web.html' class='underline text-peak-yellow'>📖 Guide complet prix & budget →</a>"
    
    - question: "Combien coûte l'hébergement et le nom de domaine ?"
      answer: "Domaine : 10-20€/an. Hébergement : 60-150€/an. Email pro : 0-60€/an. Total : 70-230€/an minimum. <a href='/web-strategy/2026/01/08/budget-site-web.html#frais-récurrents' class='underline text-peak-yellow'>📖 Frais récurrents détaillés →</a>"
    
    - question: "Ai-je besoin d'un email professionnel (contact@monsite.fr) ?"
      answer: "OUI. contact@gmail.com = amateur. contact@votresite.fr = professionnel. 75% de confiance en plus. 30-60€/an. <a href='/conseils/2026/01/08/email-professionnel.html' class='underline text-peak-yellow'>📖 Email pro expliqué →</a>"

# ⏱️ DÉLAIS & PROCESSUS
- theme: "processus"
  theme_title: "⏱️ Délais & Processus"
  theme_color: "violet"
  questions:
    - question: "Combien de temps pour créer un site web ?"
      answer: "4-8 semaines selon la complexité. Le délai dépend aussi de votre disponibilité pour fournir le contenu. <a href='/web-strategy/2026/01/08/delais-creation-site-web.html' class='underline text-peak-yellow'>📖 Délais détaillés →</a>"
    
    - question: "Comment préparer le contenu de mon site ?"
      answer: "Textes, photos, logo, coordonnées. Checklist complète pour ne rien oublier. 60% des délais = contenu manquant. <a href='/conseils/2025/01/10/contenus.html' class='underline text-peak-yellow'>📖 Préparer le contenu →</a>"
    
    - question: "Comment choisir un bon développeur web / une bonne agence ?"
      answer: "15 questions à poser, signaux d'alerte à éviter, comparaison freelance vs agence. Ne vous faites pas avoir ! <a href='/web-strategy/2026/01/08/choisir-prestataire-web.html' class='underline text-peak-yellow'>📖 Guide pour choisir →</a>"

# 🚀 TECHNIQUE & FONCTIONNALITÉS
- theme: "technique"
  theme_title: "🚀 Technique & Fonctionnalités"
  theme_color: "blue"
  questions:
    - question: "Mon site sera adapté aux smartphones ?"
      answer: "OUI, 100% responsive. 68% de vos visiteurs sont sur mobile. Un site non responsive = 70% de clients perdus. <a href='/conseils/2026/01/08/mobile-first-responsive.html' class='underline text-peak-yellow'>📖 Pourquoi le responsive est vital →</a>"
    
    - question: "Quel type de site choisir (WordPress, sur-mesure, Wix...) ?"
      answer: "WordPress pour 90% des cas (autonomie), sur-mesure si besoins spécifiques. Je travaille sur-mesure sans CMS, code à la main pour performances optimales. <a href='/web-strategy/2025/05/18/type-site.html' class='underline text-peak-yellow'>📖 Types de sites comparés →</a>"
    
    - question: "Puis-je modifier mon site moi-même après ?"
      answer: "Selon la solution choisie. Sites sur-mesure : modifications par moi. Sites WordPress : vous pouvez modifier textes/images. Formation incluse si besoin."
    
    - question: "La maintenance, c'est vraiment obligatoire ?"
      answer: "Fortement recommandée. 90% des sites piratés = sites non à jour. Maintenance = assurance contre catastrophe. <a href='/conseils/2026/01/08/maintenance-site-web.html' class='underline text-peak-yellow'>📖 Maintenance expliquée →</a>"

# 🔍 VISIBILITÉ & SEO
- theme: "seo"
  theme_title: "🔍 Visibilité & SEO"
  theme_color: "yellow"
  questions:
    - question: "Mon site sera référencé sur Google ?"
      answer: "Oui, fondations SEO incluses (balises, vitesse, mobile...), mais résultats en 2-3 mois + travail continu. Je pose les bases techniques solides dès le départ. <a href='/conseils/2025/08/22/SEO.html' class='underline text-peak-yellow'>📖 SEO : ce que je fais vraiment →</a>"
    
    - question: "Pourquoi avoir un site web si j'ai déjà Facebook ?"
      answer: "Facebook = location. Site web = propriété. Vous possédez 100% de votre site, pas votre page Facebook. 68% des recherches se font sur Google, pas Facebook. <a href='/web-strategy/2026/01/08/pourquoi-site-web-2026.html' class='underline text-peak-yellow'>📖 Site vs Réseaux sociaux →</a>"
    
    - question: "Comment savoir si mon site fonctionne ?"
      answer: "Google Analytics (gratuit) vous dit tout : visiteurs, d'où ils viennent, ce qu'ils font. Les 7 chiffres essentiels à surveiller. <a href='/conseils/2026/01/08/analytics-mesurer-performance-site.html' class='underline text-peak-yellow'>📖 Mesurer la performance →</a>"

# 🎨 DESIGN & CONTENU
- theme: "design"
  theme_title: "🎨 Design & Contenu"
  theme_color: "violet"
  questions:
    - question: "Comment choisir mon nom de domaine ?"
      answer: "Court, mémorisable, avec mots-clés si possible. .fr pour France, .com pour international. Vérifier disponibilité. <a href='/web-strategy/2025/02/10/nom-domaine.html' class='underline text-peak-yellow'>📖 Choisir son domaine →</a>"
    
    - question: "Quelles couleurs choisir pour mon site ?"
      answer: "Psychologie des couleurs selon votre secteur. 6 palettes prêtes à l'emploi. Éviter les erreurs classiques. <a href='/design-ux/2025/02/16/couleurs.html' class='underline text-peak-yellow'>📖 Guide couleurs →</a>"
    
    - question: "Quelles polices/typographies utiliser ?"
      answer: "4 combinaisons qui fonctionnent toujours. Lisibilité > Originalité. Google Fonts (gratuit) recommandé. <a href='/design-ux/2025/01/12/polices.html' class='underline text-peak-yellow'>📖 Guide typographie →</a>"
    
    - question: "Pourquoi les images/visuels sont importants ?"
      answer: "Impact énorme sur crédibilité. Photos pros vs photos amateur = différence perception. Avant/après comparés. <a href='/design-ux/2025/03/17/visuels.html' class='underline text-peak-yellow'>📖 Importance des visuels →</a>"

# ⚖️ JURIDIQUE & OBLIGATIONS
- theme: "juridique"
  theme_title: "⚖️ Juridique & Obligations"
  theme_color: "blue"
  questions:
    - question: "RGPD, mentions légales, cookies... c'est obligatoire ?"
      answer: "OUI pour TOUS les sites. Amendes jusqu'à 20M€ (en théorie). Je fournis tous les modèles, vous n'avez qu'à remplir vos infos. <a href='/web-strategy/2026/01/08/rgpd-obligations-legales.html' class='underline text-peak-yellow'>📖 Obligations légales →</a>"

