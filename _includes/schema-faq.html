{% comment %}
  FAQ Schema.org pour les pages avec questions/réponses
{% endcomment %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "Comment savoir quel site est adapte a mon activite ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Le bon site depend surtout de votre activite, de la clarte de votre offre, du niveau de confiance a installer et du parcours de contact a mettre en place. Je commence toujours par cadrer ces points avant de recommander une solution."
      }
    },
    {
      "@type": "Question",
      "name": "Combien de temps faut-il pour créer un site web ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "La création d'un site vitrine prend généralement 2 à 4 semaines, tandis qu'un site e-commerce ou une application web sur-mesure peut nécessiter 6 à 12 semaines. Les délais dépendent de la complexité du projet, du nombre de pages, des fonctionnalités et de la rapidité de vos retours."
      }
    },
    {
      "@type": "Question",
      "name": "Pourquoi avoir un site web en 2026 ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Un site web est votre vitrine digitale accessible 24h/24. Il renforce votre credibilite professionnelle, permet d'etre visible sur Google, de presenter vos services clairement et de generer des demandes de contact de facon reguliere."
      }
    },
    {
      "@type": "Question",
      "name": "Comment être visible sur Google ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Pour être visible sur Google, votre site doit etre optimise SEO : contenu de qualite repondant aux recherches de vos clients, structure technique performante, vitesse de chargement rapide, compatibilite mobile, et lancement propre de votre Google Business Profile. Je vous accompagne sur ces fondamentaux pour maximiser votre visibilite locale et nationale."
      }
    },
    {
      "@type": "Question",
      "name": "Proposez-vous la maintenance de site web ?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Oui, je propose des contrats de maintenance incluant les mises à jour de sécurité, les sauvegardes régulières, les corrections de bugs, et l'assistance technique. La maintenance garantit que votre site reste performant, sécurisé et à jour."
      }
    }
  ]
}
</script>
