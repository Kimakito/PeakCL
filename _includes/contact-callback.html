<!-- Formulaire de rappel client -->
<form class="bg-gradient-to-br from-peak-blue-dark to-peak-violet rounded-2xl shadow-2xl p-8 max-w-md mx-auto my-12 border-2 border-peak-yellow" name="callback-inline" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/merci.html">
  <input type="hidden" name="form-name" value="callback-inline">
  <!-- Champ anti-spam caché -->
  <p class="hidden">
    <label>Ne pas remplir : <input name="bot-field" /></label>
  </p>
  <h2 class="text-3xl font-extrabold mb-3 text-center text-peak-yellow drop-shadow-lg">📞 Être Rappelé</h2>
  <p class="text-center text-white/85 mb-6 text-sm drop-shadow-md">Vous choisissez comment être contacté, c'est simple, rapide et confidentiel. <span class="font-semibold text-peak-yellow">Aucune prospection, juste un échange humain !</span></p>
  <div class="mb-4">
    <label for="name" class="block text-white font-semibold mb-1">Votre nom</label>
    <input type="text" id="name" name="name" required class="w-full border-2 border-peak-yellow/50 focus:border-peak-yellow rounded-lg px-4 py-3 bg-white text-peak-blue-dark focus:outline-none focus:ring-2 focus:ring-peak-yellow" placeholder="Nom et prénom">
  </div>
  <div class="mb-4">
    <label for="email" class="block text-white font-semibold mb-1">Email</label>
    <input type="email" id="email" name="email" required class="w-full border-2 border-peak-yellow/50 focus:border-peak-yellow rounded-lg px-4 py-3 bg-white text-peak-blue-dark focus:outline-none focus:ring-2 focus:ring-peak-yellow" placeholder="Votre email">
  </div>
  <div class="mb-4">
    <label for="phone" class="block text-white font-semibold mb-1">Téléphone</label>
    <input type="tel" id="phone" name="phone" required class="w-full border-2 border-peak-yellow/50 focus:border-peak-yellow rounded-lg px-4 py-3 bg-white text-peak-blue-dark focus:outline-none focus:ring-2 focus:ring-peak-yellow" placeholder="06 12 34 56 78">
  </div>
  <div class="mb-5">
    <label class="block text-white font-semibold mb-2">Préférence de contact</label>
    <div class="flex gap-6">
      <label class="inline-flex items-center cursor-pointer">
        <input type="radio" name="contact_mode" value="email" checked class="form-radio text-peak-yellow focus:ring-peak-yellow">
        <span class="ml-2 text-white">📧 Mail</span>
      </label>
      <label class="inline-flex items-center cursor-pointer">
        <input type="radio" name="contact_mode" value="sms" class="form-radio text-peak-yellow focus:ring-peak-yellow">
        <span class="ml-2 text-white">💬 SMS</span>
      </label>
      <label class="inline-flex items-center cursor-pointer">
        <input type="radio" name="contact_mode" value="appel" class="form-radio text-peak-yellow focus:ring-peak-yellow">
        <span class="ml-2 text-white">📞 Appel</span>
      </label>
    </div>
  </div>
  <div class="mb-6">
    <label for="message" class="block text-white font-semibold mb-1">Message (optionnel)</label>
    <textarea id="message" name="message" class="w-full border-2 border-peak-yellow/50 focus:border-peak-yellow rounded-lg px-4 py-3 bg-white text-peak-blue-dark focus:outline-none focus:ring-2 focus:ring-peak-yellow" rows="3" placeholder="Votre demande..."></textarea>
  </div>
  <button type="submit" class="w-full bg-peak-yellow hover:bg-yellow-300 text-peak-blue-dark font-bold py-4 rounded-full shadow-lg transform hover:scale-105 transition-all duration-300 text-lg">✨ Être Rappelé</button>
  <p class="text-xs text-white/70 mt-4 text-center">✅ Simple et sans engagement • ❌ Aucune prospection • 🔒 Données sécurisées</p>
</form>
