<!doctype html>
<html lang="fr">
  <head>

    <title>Netlify Forms</title>

  <body>
    <!--
      Netlify scans static HTML at build time to register forms.
      AJAX submissions must POST to this file (not /) on SSR sites.
    -->
    <form
      name="contact"
      method="POST"
      action="/merci"
      data-netlify="true"
      data-netlify-honeypot="bot-field"
    >
      <input type="hidden" name="form-name" value="contact" />
      <input type="hidden" name="leadType" value="audit_gratuit" />
      <input type="hidden" name="source" value="site_peakcl" />
      <p style="display:none">
        <label>Ne pas remplir: <input name="bot-field" /></label>
      </p>
      <p>
        <label>Nom <input name="name" required /></label>
      </p>
      <p>
        <label>Email <input name="email" type="email" required /></label>
      </p>
      <p>
        <label>Message <textarea name="message" required></textarea></label>
      </p>
      <button type="submit">Envoyer</button>
    </form>

    <form
      name="brief-projet"

      </p>

        <label>Nom <input name="fullName" required /></label>

      <p>
        <label>Email <input name="email" type="email" required /></label>
      </p>
      <p>
        <label>Activité <input name="businessName" required /></label>
      </p>
      <p>
        <label>Ville/zone <input name="cityZone" required /></label>
      </p>
      <p>
        <label>Résumé <textarea name="projectSummary" required></textarea></label>
      </p>
      <button type="submit">Envoyer</button>
    </form>
