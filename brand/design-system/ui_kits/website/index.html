<!-- @dsCard group="Website" viewport="1440x900" name="Landing PeakCL" subtitle="Site vitrine — héros, services, méthode, contact" -->
<!-- @startingPoint section="Écrans" subtitle="Landing page complète aux couleurs PeakCL v2" viewport="1440x900" -->
<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<title>PeakCL — Délègue ta communication</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  .wrap{max-width:var(--container);margin:0 auto;padding:0 32px}
  nav.top{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
  .navin{display:flex;align-items:center;gap:28px;height:72px}
  .navlinks{display:flex;gap:24px;margin-left:auto;align-items:center;font-weight:700;font-size:15px}
  .navlinks a{color:var(--ink)}
  .navlinks a:hover{color:var(--bleu-500)}
  .hero{display:grid;grid-template-columns:1.1fr .9fr;gap:48px;align-items:center;padding:72px 32px 88px}
  .kicker{display:inline-flex;align-items:center;gap:8px;font-weight:800;font-size:13px;letter-spacing:.14em;color:var(--bleu-500);text-transform:uppercase}
  .kicker::before{content:"";width:10px;height:10px;border-radius:3px;background:var(--grad-jaune)}
  .hero h1{font-size:clamp(38px,4.6vw,58px);margin:16px 0 18px}
  .hero p.lead{font-size:19px;color:var(--neutre-600);max-width:32em;margin-bottom:28px}
  .mosaic{position:relative;display:grid;grid-template-columns:repeat(2,1fr);gap:18px;padding:8px}
  .sq{border-radius:28px;aspect-ratio:1;box-shadow:var(--shadow-md)}
  .sect{padding:var(--section-y) 0}
  .sect-head{max-width:560px;margin-bottom:40px}
  .sect-head h2{font-size:var(--fs-h2);margin:12px 0 10px}
  .sect-head p{color:var(--neutre-600)}
  .cards3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .steps{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  .proof{display:flex;gap:40px;justify-content:center;flex-wrap:wrap;padding:36px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
  .proof b{display:block;font:800 30px/1.1 "Baloo 2",sans-serif;color:var(--ink)}
  .proof span{font-size:14px;color:var(--neutre-600);font-weight:600}
  .contact{background:var(--grad-bg-dark);border-radius:var(--radius-xl);color:#fff;display:grid;grid-template-columns:1fr .9fr;gap:40px;padding:56px;align-items:center;overflow:hidden;position:relative}
  .contact h2{font-size:var(--fs-h2);color:#fff;margin:10px 0 12px}
  .contact .kicker{color:var(--jaune-500)}
  .contact p{color:rgba(255,255,255,.75)}
  footer{padding:36px 0;display:flex;align-items:center;gap:20px;color:var(--neutre-600);font-size:14px;font-weight:600}
  footer img{height:34px}
  @media(max-width:900px){.hero,.contact{grid-template-columns:1fr}.cards3,.steps{grid-template-columns:1fr}}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script>window.__dsBase="../../";</script>
<script src="../../ds-loader.js"></script>
</head><body>
<div id="root"></div>
<script type="text/babel">

const Arrow = () => <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M7 17L17 7M7 7h10v10"/></svg>;

function App(){
  const [sent,setSent]=React.useState(false);
  return <div>
    <nav className="top"><div className="wrap navin">
      <img src="../../assets/logotype-horizontal.png" alt="PeakCL" style={{height:26}}/>
      <div className="navlinks">
        <a href="#services">Services</a><a href="#methode">Méthode</a><a href="#contact">Contact</a>
        <Button size="sm">Réserver un appel</Button>
      </div>
    </div></nav>

    <header className="wrap hero">
      <div>
        <span className="kicker">Communication déléguée</span>
        <h1>Pas le temps pour ton site, tes réseaux et ton image ?</h1>
        <p className="lead">Délègue-moi toute ta communication en ligne. Un seul interlocuteur, du diagnostic à la mise en ligne — et toi, tu retournes à ton métier.</p>
        <div style={{display:'flex',gap:14,flexWrap:'wrap',alignItems:'center'}}>
          <Button variant="primary" size="lg">Remplir le brief (8 min)</Button>
          <Button variant="ghost" size="lg" iconRight={<Arrow/>}>Voir le portfolio</Button>
        </div>
        <div style={{display:'flex',gap:10,marginTop:26,flexWrap:'wrap'}}>
          <Badge tone="jaune" dot>5/5 sur Google</Badge>
          <Badge tone="turquoise">+20 projets livrés</Badge>
          <Badge tone="lavande">Devis sous 48 h</Badge>
        </div>
      </div>
      <div className="mosaic">
        <div className="sq" style={{background:'var(--grad-bleu)',transform:'rotate(-2deg)'}}></div>
        <div className="sq" style={{background:'var(--grad-turquoise)',transform:'rotate(2deg) translateY(14px)'}}></div>
        <div className="sq" style={{background:'var(--grad-lavande)',transform:'rotate(1.5deg)'}}></div>
        <div className="sq" style={{background:'var(--grad-jaune)',transform:'rotate(-2deg) translateY(14px)'}}></div>
        <img src="../../assets/mascotte-ligne.svg" alt="Charlotte" style={{position:'absolute',bottom:-10,left:'50%',transform:'translateX(-50%)',height:'82%',filter:'drop-shadow(0 12px 24px rgba(19,0,77,.25))'}}/>
      </div>
    </header>

    <section id="services" className="sect" style={{background:'var(--neutre-50)'}}>
      <div className="wrap">
        <div className="sect-head">
          <span className="kicker">Services</span>
          <h2>Tout ce qu'il faut pour être visible</h2>
          <p>Quatre briques, un ensemble cohérent. Tu prends tout, ou juste ce qu'il te manque.</p>
        </div>
        <div className="cards3">
          <Card tone="bleu" title="Site web">Un site clair et rapide, pensé pour transformer les visites en demandes de devis.</Card>
          <Card tone="turquoise" title="Être trouvé sur Google">Fiche établissement, avis, référencement local : tes clients te trouvent.</Card>
          <Card tone="lavande" title="Identité de marque">Logo, couleurs, typographies — une image professionnelle et cohérente partout.</Card>
        </div>
        <div style={{display:'flex',gap:10,marginTop:22,flexWrap:'wrap'}}>
          <Tag>Réseaux sociaux</Tag><Tag>Flyers & print</Tag><Tag>Photos</Tag><Tag active onClick={()=>{}}>Formule complète</Tag>
        </div>
      </div>
    </section>

    <section id="methode" className="sect">
      <div className="wrap">
        <div className="sect-head">
          <span className="kicker">Ma méthode</span>
          <h2>Quatre paliers, zéro jargon</h2>
        </div>
        <div className="steps">
          <Card kicker="Palier 01" title="Tu remplis le brief">Un formulaire de 8 minutes pour comprendre ton activité et tes objectifs.</Card>
          <Card kicker="Palier 02" title="On s'appelle">30 minutes pour valider le cap. Devis sous 48 h, sans surprise.</Card>
          <Card kicker="Palier 03" title="Je produis">Tu valides à chaque étape. Délai moyen : 14 jours.</Card>
          <Card kicker="Palier 04" title="Mise en ligne">Tout est livré, expliqué, et je reste disponible après.</Card>
        </div>
      </div>
    </section>

    <div className="wrap proof">
      <div><b>5/5</b><span>note Google</span></div>
      <div><b>+20</b><span>projets livrés</span></div>
      <div><b>14 j</b><span>délai moyen</span></div>
      <div><b>48 h</b><span>pour un devis</span></div>
    </div>

    <section id="contact" className="sect">
      <div className="wrap">
        <div className="contact">
          <div>
            <span className="kicker">Contact</span>
            <h2>On en parle ?</h2>
            <p style={{marginBottom:22}}>Dis-moi où tu en es : je te réponds sous 48 h avec des pistes concrètes.</p>
            {sent
              ? <Alert tone="success" title="Merci !">Ton message est bien parti — réponse sous 48 h.</Alert>
              : <div style={{display:'grid',gap:14}}>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
                    <Input label={<span style={{color:'#fff'}}>Ton prénom</span>} placeholder="Camille" />
                    <Input label={<span style={{color:'#fff'}}>Ton email</span>} placeholder="camille@exemple.fr" />
                  </div>
                  <Select label={<span style={{color:'#fff'}}>Ton besoin</span>} placeholder="Choisir…" options={['Site web','Identité de marque','Réseaux sociaux','Être trouvé sur Google','Formule complète']} />
                  <Checkbox label={<span style={{color:'rgba(255,255,255,.85)'}}>J'accepte d'être recontactée</span>} defaultChecked />
                  <div><Button variant="primary" size="lg" onClick={()=>setSent(true)}>Envoyer</Button></div>
                </div>}
          </div>
          <img src="../../assets/fond-fonce-logo.png" alt="" style={{width:'70%',justifySelf:'center'}}/>
        </div>
      </div>
    </section>

    <footer className="wrap">
      <img src="../../assets/logotype-horizontal.png" alt="PeakCL" style={{height:24}}/>
      <span>© 2026 PeakCL — Charlotte Lacroix, Albertville</span>
      <span style={{marginLeft:'auto'}}><a href="#">Mentions légales</a></span>
    </footer>
  </div>;
}
window.__dsReady.then(NS => { Object.assign(window, NS); ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
});
</script>
</body></html>
