[build]
  command = "npm run build"
  publish = "dist/client"

# Netlify TanStack Start plugin outputs functions here
[functions]
  directory = ".netlify/v1/functions"

# TanStack Start on Netlify runs via a serverless function.
# SEO: redirect legacy URLs (previous site/blog) so Google doesn't see 404.
[[redirects]]
  from = "http://www.peakcl.com/*"
  to = "https://peakcl.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://peakcl.com/*"
  to = "https://peakcl.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.peakcl.com/*"
  to = "https://peakcl.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/developpement-web"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/developpement-web/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/conseils/*"
  to = "/"
  status = 301
  force = true

